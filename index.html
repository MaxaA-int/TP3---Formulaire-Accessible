<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/style.css">
        <script defer src="js/main.js"></script>
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <main class="main">

            <p class="main__texte">Publication Gratuite</p>
            <p class="main__texte">Commander une <span class="italic">brochure</span> gratuite</p>

            <form action="index.html" class="formulaire" method="post">

                <div class="formulaire__containeur contenu">

                    <fieldset class="contenu-format format">
                        <legend class="format__legende">Format de la brochure</legend>

                        <ul class="format__liste">

                            <li class="format__liste__item">
                                <input name="format" id="imprime" type="radio" value="imprime">
                                <label for="imprime">
                                    <img src="images/icon-file-print.svg" alt="Format Imprimé">
                                </label>
                            </li>

                            <li class="format__liste__item">
                                <input name="format" id="pdf" type="radio" value="pdf">
                                <label for="pdf">
                                    <img src="images/icon-file-pdf.svg" alt="Format PDF">
                                </label>
                            </li>

                            <li class="format__liste__item">
                                 <input name="format" id="epub" type="radio" value="epub">
                                <label for="epub">
                                    <img src="images/icon-file-epub.svg" alt="Format ePub">
                                </label>
                            </li>

                        </ul>
                    </fieldset>

                    <fieldset class="contenu-contact contact">
                        <legend class="contact__legende">Informations de Contact</legend>

                        <label for=""></label><input type="text"><label for=""></label><input type="text"><label for=""></label><input type="text"><label for=""></label><input type="text">
                        

                    </fieldset>
                </div>
            </form>
        </main>
    </body>
</html>
