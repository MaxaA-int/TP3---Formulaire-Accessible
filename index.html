<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/style.css">
        <script defer src="js/main.js"></script>
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <main class="main">

            <img src="images/gradient.jpg" alt="" class="background-gradient">

            <div class="main__containeur">
                <div class="main__texte commander">
                    <a href="formulaire" class="screen-reader-only focusable">Accéder au formulaire</a>
                    <p class="commander__texte small-caps">publication gratuite</p>
                    <h1 class="commander__titre">Commander une <span class="italic couleur-primaire">brochure</span> gratuite</h1>
                </div>

                <form action="index.html" class="formulaire" method="post" id="formulaire">

                    <div class="formulaire__containeur contenu">

                        <fieldset class="contenu-format format">
                            <legend class="format__legende legende small-caps">Format de la brochure</legend>

                            <ul class="format__liste format__containeur containeur">

                                <li class="format__liste__item">
                                    <input name="format" id="imprime" type="radio" value="imprime" class="screen-reader-only">
                                    <label for="imprime">
                                        <img src="images/icon-file-print.svg" alt="Format Imprimé">
                                        <p class="imprime__texte">Imprimé</p>
                                    </label>
                                </li>

                                <li class="format__liste__item">
                                    <input name="format" id="pdf" type="radio" value="pdf" class="screen-reader-only">
                                    <label for="pdf">
                                        <img src="images/icon-file-pdf.svg" alt="Format PDF">
                                        <p class="pdf__texte">PDF</p>
                                    </label>
                                </li>

                                <li class="format__liste__item">
                                    <input name="format" id="epub" type="radio" value="epub" class="screen-reader-only">
                                    <label for="epub">
                                        <img src="images/icon-file-epub.svg" alt="Format ePub">
                                        <p class="epub__texte">ePub</p>
                                    </label>
                                </li>

                            </ul>
                        </fieldset>

                        <fieldset class="contenu-contact contact small-caps">
                            <legend class="contact__legende legende">Informations de Contact</legend>

                            <div class="contact__containeur containeur">

                                <div class="nom-prenom__containeur table--flex--row">
                                    <p class="containeur__item">
                                        <label for="prenom">Prénom</label>
                                        <input name="prenom" id="prenom" type="text">
                                    </p>
                                    
                                    <p class="containeur__item">
                                        <label for="nom">Nom</label>
                                        <input name="nom" id="nom" type="text">
                                    </p>
                                </div>
                                
                                <p class="containeur__item">
                                    <label for="email">
                                        Courriel <span class="info__exemple">(exemple@domaine.com)</span>
                                    </label>
                                    <input name="email" id="email" type="email">
                                </p>
                                
                                <p class="containeur__item">
                                    <label for="telephone">
                                        Téléphone <span class="info__exemple">(514 555 0123)</span>
                                    </label>
                                    <input name="telephone" id="telephone" type="number">
                                </p>
                            
                            </div>

                        </fieldset>

                        <fieldset class="contenu-postales postales small-caps">
                            <legend class="postales__legende legende">Informations Postales</legend>

                            <div class="postales__containeur containeur">

                                <p class="containeur__item">
                                    <label for="adresse">
                                        Adresse <span class="info__exemple">(123, rue Principale)</span>
                                    </label>
                                    <input name="adresse" id="adresse" type="text">
                                </p>
                                
                                <div class="localisation__containeur table--flex--row">
                                    <p class="containeur__item">
                                        <label for="pays">Pays</label>
                                        <select name="pays" id="pays">
                                            <option value="selectionner">- Sélectionner -</option>
                                            <option value="canada">Canada</option>
                                            <option value="usa">États-Unis</option>
                                            <option value="espagne">Espagne</option>
                                        </select>
                                    </p>

                                    <p class="containeur__item">
                                        <label for="province_etat">Province ou État</label>
                                        <select name="province_etat" id="province_etat">
                                            <optgroup label="Aucun">
                                                <option value="selectionner">- Sélectionner -</option>
                                            </optgroup>
                                            <optgroup label="Canada">
                                                <option value="QC">Québec</option>
                                                <option value="ON">Ontario</option>
                                                <option value="BC">British Columbia</option>
                                                <option value="AB">Alberta</option>
                                            </optgroup>
                                            <optgroup label="États-Unis">
                                                <option value="CA">Californie</option>
                                                <option value="NY">New York</option>
                                            </optgroup>
                                        </select>
                                    </p>
                                </div>
                                
                                <p class="containeur__item">
                                    <label for="codePostal">
                                        Code Postal <span class="info__exemple">(A1A 1A1)</span>
                                    </label>
                                    <input name="codePostal" id="codePostal" type="text" max="7">
                                </p>
                            
                            </div>

                        </fieldset>

                        <div class="footer__containeur containeur">

                            <p class="containeur__item infolettre">
                                <input type="checkbox" name="infolettre" id="infolettre">
                                <label for="infolettre">
                                    Je désire recevoir des informations mensuelles par courriel
                                    sur les nouvelles publications et ressources disponibles
                                </label>
                            </p>

                            
                        </div>

                        <p class="bouton-commander">
                            <input type="button" name="commander" id="commander" value="Commander">
                        </p>
                        
                    </div>
                </form>
            </div>
        </main>
    </body>
</html>
