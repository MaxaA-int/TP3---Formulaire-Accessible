<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/style.css">
        <script defer src="js/main.js"></script>
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <main class="main">

            <img src="images/gradient.jpg" alt="" class="background-gradient">

            <div class="main__containeur">
                <div class="main__texte commander">
                    <a href="#formulaire" class="screen-reader-only focusable">Accéder au formulaire</a>
                    <p class="commander__texte small-caps">publication gratuite</p>
                    <h1 class="commander__titre">Commander une <span class="italic couleur-primaire">brochure</span> gratuite</h1>
                </div>

                <form action="index.html" class="formulaire" method="post" id="formulaire">

                    <div class="formulaire__containeur contenu">

                        <fieldset class="contenu-format format">
                            
                            <div class="format__repere repere">
                                <svg class="icone format__icone" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="9" rx="1"/>
                                    <rect x="3" y="16" width="7" height="5" rx="1"/><rect x="14" y="16" width="7" height="5" rx="1"/>
                                </svg>

                                <legend class="format__legende legende small-caps">Format de la brochure</legend>
                            </div>

                            <div class="format__containeur containeur">

                                <ul class="format__liste table--flex--row">

                                    <li class="format__liste__item">
                                        <input name="format" id="imprime" type="radio" value="imprime" class="screen-reader-only" required>
                                        <label for="imprime">
                                            <img src="images/icon-file-print.svg" alt="Format Imprimé">
                                            <p class="imprime__texte">Imprimé</p>
                                        </label>
                                    </li>

                                    <li class="format__liste__item">
                                        <input name="format" id="pdf" type="radio" value="pdf" class="screen-reader-only" required>
                                        <label for="pdf">
                                            <img src="images/icon-file-pdf.svg" alt="Format PDF">
                                            <p class="pdf__texte">PDF</p>
                                        </label>
                                    </li>

                                    <li class="format__liste__item">
                                        <input name="format" id="epub" type="radio" value="epub" class="screen-reader-only" required>
                                        <label for="epub">
                                            <img src="images/icon-file-epub.svg" alt="Format ePub">
                                            <p class="epub__texte">ePub</p>
                                        </label>
                                    </li>

                                </ul>

                            </div>
                        </fieldset>

                        <fieldset class="contenu-contact contact small-caps">
                            
                            <div class="format__repere repere">

                                <svg class="icone contact__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                                </svg>

                                <legend class="contact__legende legende">Informations de Contact</legend>
                            </div>

                            <div class="contact__containeur containeur">

                                <div class="nom-prenom__containeur table--flex--row">
                                    <p class="containeur__item">
                                        <label for="prenom">Prénom</label>
                                        <input name="prenom" id="prenom" type="text" required pattern="[a-zA-Z0-9]+">
                                    </p>
                                    
                                    <p class="containeur__item">
                                        <label for="nom">Nom</label>
                                        <input name="nom" id="nom" type="text" required pattern="[a-zA-Z0-9]+">
                                    </p>
                                </div>
                                
                                <p class="containeur__item">
                                    <label for="email">
                                        Courriel <span class="info__exemple">(exemple@domaine.com)</span>
                                    </label>
                                    <input name="email" id="email" type="email" required>
                                </p>
                                
                                <p class="containeur__item">
                                    <label for="telephone">
                                        Téléphone <span class="info__exemple">(exemple : 514 555 0123)</span>
                                    </label>
                                    <input name="telephone" id="telephone" type="number" required>
                                </p>
                            
                            </div>

                        </fieldset>

                        <fieldset class="contenu-postales postales small-caps">

                            <div class="postales__repere repere">

                                <svg class="icone postales__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                                </svg>
                                
                                <legend class="postales__legende legende">Informations Postales</legend>
                            </div>

                            <div class="postales__containeur containeur">

                                <p class="containeur__item">
                                    <label for="adresse">
                                        Adresse <span class="info__exemple">(exemple : 123, rue Principale)</span>
                                    </label>
                                    <input name="adresse" id="adresse" type="text" required pattern="\d+,\s[A-Za-zÀ-ÿ]+(\s[A-Za-zÀ-ÿ]+)*">
                                </p>
                                
                                <div class="localisation__containeur table--flex--row">
                                    <p class="containeur__item">
                                        <label for="pays">Pays</label>
                                        <select name="pays" id="pays" required>
                                            <option value="selectionner">- Sélectionner -</option>
                                            <option value="canada">Canada</option>
                                            <option value="usa">États-Unis</option>
                                            <option value="espagne">Espagne</option>
                                        </select>
                                    </p>

                                    <p class="containeur__item">
                                        <label for="province_etat">Province ou État</label>
                                        <select name="province_etat" id="province_etat" required>
                                            <optgroup label="Aucun">
                                                <option value="selectionner">- Sélectionner -</option>
                                            </optgroup>
                                            <optgroup label="Canada">
                                                <option value="QC">Québec</option>
                                                <option value="ON">Ontario</option>
                                                <option value="BC">British Columbia</option>
                                                <option value="AB">Alberta</option>
                                            </optgroup>
                                            <optgroup label="États-Unis">
                                                <option value="CA">Californie</option>
                                                <option value="NY">New York</option>
                                            </optgroup>
                                        </select>
                                    </p>
                                </div>
                                
                                <p class="containeur__item">
                                    <label for="codePostal">
                                        Code Postal <span class="info__exemple">(exemple : A1A 1A1)</span>
                                    </label>
                                    <input name="codePostal" id="codePostal" type="text" max="7" required pattern="[A-Za-z]\d[A-Za-z]\s\d[A-Za-z]\d">
                                </p>
                            
                            </div>

                        </fieldset>

                        <div class="footer__containeur containeur">

                            <p class="containeur__item infolettre">
                                <input type="checkbox" name="infolettre" id="infolettre">
                                <label for="infolettre">
                                    Je désire recevoir des informations mensuelles par courriel
                                    sur les nouvelles publications et ressources disponibles
                                </label>
                            </p>

                            
                        </div>

                        <p class="bouton-commander">
                            <button name="btnCommander" id="btnCommander" value="Commander">
                                <label for="btnCommander">Commander</label>
                                <img src="images/icon-arrow.svg" alt="Commander">
                            </button>
                        </p>
                        
                    </div>
                </form>
            </div>
        </main>
    </body>
</html>
